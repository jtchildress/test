<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bahrain Grand Prix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav aria-label="Main Navigation">
            <ul>
                <li><a href="#about" accesskey="a">About</a></li>
                <li><a href="#schedule" accesskey="s">Schedule</a></li>
                <li><a href="#contact" accesskey="c">Contact</a></li>
            </ul>
        </nav>
        <h1 tabindex="0">Bahrain Grand Prix</h1>
    </header>
    <main>
        <section id="about">
            <h2 tabindex="0">About the race</h2>
            <p>
                
            </p>
        </section>
        <section id="schedule">
            <h2 tabindex="0">Event Schedule</h2>
            <ul>
                <li>Practice: Friday</li>
                <li>Qualifying: Saturday</li>
                <li>Race: Sunday</li>
            </ul>
        </section>
        <section id="contact">
            <h2 tabindex="0">Contact Us</h2>
            <form aria-label="Contact form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" aria-required="true" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" aria-required="true" required>
                <label for="message">Message:</label>
                <textarea id="message" name="message" aria-required="true" required></textarea>
                <button type="submit">Send</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 Bahrain Grand Prix</p>
    </footer>
</body>
</html>
